<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Korean Poem Generator</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <header>
      <h1>AI Korean Poem Generator</h1>
    </header>

    <main>
      <form>
        <input
          autofocus
          required
          autocomplete="off"
          type="text"
          placeholder="Enter the topic of the poem"
        />
        <input type="submit" value="Generate" />
      </form>
      <div>
        The Korean poem will appear here once you click the "Generate" button.
      </div>
    </main>

    <footer>
      This AI project was coded by
      <a href="https://github.com/TomariCodes" target="_blank"
        >Tomari Southern</a
      >
      and is<a
        href="https://github.com/TomariCodes/korean-poem-generator"
        target="_blank"
      >
        open-sourced on Github</a
      >
      and is
      <a href="https://koreanpoemgen.netlify.app/" target="_blank"
        >hosted on Netlify</a
      >
    </footer>
    <script src="src/main.js"></script>
  </body>
</html>
